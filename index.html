// ── NAV ────────────────────────────────────────────────────

  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    { href: "#home", label: "Home" },
    { href: "#services", label: "Services" },
    { href: "#why-us", label: "Why Us" },
    { href: "#gallery", label: "Gallery" },
    { href: "#contact", label: "Contact" },
  ];

    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
    background: scrolled ? SETTINGS.creamColor : 'transparent',
    borderBottom: scrolled ? `1px solid ${SETTINGS.accentColor}33` : 'none',
    transition: 'background 0.3s, border-color 0.3s',
    boxShadow: scrolled ? '0 2px 12px rgba(0,0,0,0.06)' : 'none',
  };

    fontSize: '14px',
    fontWeight: '500',

            <a href={SETTINGS.googleReviewUrl} target="_blank" rel="noopener noreferrer" style={{
              display: 'inline-flex', alignItems: 'center', gap: 10,
              background: '#fff', border: `1px solid ${SETTINGS.darkColor}12`,
              borderRadius: 3, padding: '10px 16px', textDecoration: 'none',
              boxShadow: '0 2px 8px rgba(0,0,0,0.06)', transition: 'box-shadow 0.2s',
            }}
              onMouseEnter={e => e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.12)'}
              onMouseLeave={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)'}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              <div>
                <div style={{ fontSize: '13px', fontWeight: '600', color: SETTINGS.darkColor }}>Leave us a Google Review</div>
                <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                  {[1,2,3,4,5].map(i => <IconStar key={i} size={12} filled={true} color="#FBBC05"/>)}
                </div>
              </div>
            </a>
          </div>
        </div>
        <div style={{ background: '#fff', border: `1px solid ${SETTINGS.darkColor}10`, borderRadius: 3, padding: '48px 40px' }}>
          {status === 'sent' ? (
            <div style={{ textAlign: 'center', padding: '40px 0' }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>✅</div>
              <h3 style={{ fontFamily: 'Playfair Display, serif', fontSize: '24px', color: SETTINGS.darkColor, marginBottom: 12 }}>Message Sent!</h3>
              <p style={{ color: '#6a6458', fontSize: '15px' }}>We'll be in touch shortly. Thank you for reaching out to West Energy LLC.</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <div>
                  <label style={{ display: 'block', fontSize: '12px', fontWeight: '600', letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8070', marginBottom: 8 }}>Name *</label>
                  <input required style={inputStyle} placeholder="Your name" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} />
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: '12px', fontWeight: '600', letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8070', marginBottom: 8 }}>Phone</label>
                  <input style={inputStyle} placeholder="(609) 000-0000" value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} />
                </div>
              </div>
              <div>
                <label style={{ display: 'block', fontSize: '12px', fontWeight: '600', letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8070', marginBottom: 8 }}>Email *</label>
                <input required type="email" style={inputStyle} placeholder="your@email.com" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: '12px', fontWeight: '600', letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8070', marginBottom: 8 }}>Service Needed</label>
                <select style={{ ...inputStyle, appearance: 'none' }} value={form.service} onChange={e => setForm({ ...form, service: e.target.value })}>
                  <option value="">Select a service...</option>
                  <option>Residential Electrical</option>
                  <option>Commercial Electrical</option>
                  <option>Panel Upgrade</option>
                  <option>EV Charger Installation</option>
                  <option>Generator Installation</option>
                  <option>Lighting / Smart Home</option>
                  <option>New Construction</option>
                  <option>Aerial Photography &amp; Thermography</option>
                  <option>Other</option>
                </select>
              </div>
              <div>
                <label style={{ display: 'block', fontSize: '12px', fontWeight: '600', letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8070', marginBottom: 8 }}>Message</label>
                <textarea style={{ ...inputStyle, height: 120, resize: 'vertical' }} placeholder="Describe your project or question..." value={form.message} onChange={e => setForm({ ...form, message: e.target.value })} />
              </div>
              {status === 'error' && (
                <div style={{
                  background: '#fdecec', color: '#8a2c2c', border: '1px solid #f3c2c2',
                  padding: '12px 14px', borderRadius: 2, fontSize: '13px',
                }}>
                  {errorMsg} You can also email us directly at <a href={`mailto:${SETTINGS.emailAddress}`} style={{ color: '#8a2c2c' }}>{SETTINGS.emailAddress}</a>.
                </div>
              )}
              <button type="submit" disabled={status === 'sending'} style={{
                background: SETTINGS.accentColor, color: '#fff', border: 'none',
                padding: '16px', borderRadius: 2, fontSize: '14px', fontWeight: '600',
                letterSpacing: '0.08em', textTransform: 'uppercase',
                cursor: status === 'sending' ? 'wait' : 'pointer',
                opacity: status === 'sending' ? 0.7 : 1,
              }}>
                {status === 'sending' ? 'Sending…' : 'Send Message'}
              </button>
            </form>
          )}
        </div>
      </div>
      <style>{`
        @media (max-width: 768px) {
          #contact > div { grid-template-columns: 1fr !important; gap: 40px !important; }
        }
      `}</style>
    </section>
  );
}

// ── FOOTER ────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{ background: SETTINGS.darkColor, padding: '48px 32px', borderTop: `1px solid ${SETTINGS.accentColor}20` }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 24 }}>
        <div>
          <img src="uploads/West Energy Logo no background.png" alt="West Energy LLC" style={{ height: 44, marginBottom: 12 }} />
          <div style={{ color: '#5a5448', fontSize: '12px', lineHeight: 1.8 }}>
            Licensed Electrical Contractor<br />
            NJ License #34EI01887500<br />
            Forked River, NJ
          </div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ color: '#5a5448', fontSize: '12px', marginBottom: 8 }}>
            © {new Date().getFullYear()} West Energy LLC. All rights reserved.
          </div>
          <div style={{ color: '#5a5448', fontSize: '12px' }}>
            <a href="https://www.westenergyusa.com/" style={{ color: '#6a6258', textDecoration: 'none' }}>westenergyusa.com</a>
          </div>
        </div>
      </div>
    </footer>
  );
}

// ── APP ───────────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState('home');

  useEffect(() => {
    const sections = ['home', 'services', 'why-us', 'gallery', 'contact'];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) setActiveSection(entry.target.id);
      });
    }, { threshold: 0.3 });
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <div>
      <Nav activeSection={activeSection} />
      <Hero />
      <Services />
      <WhyUs />
      <Gallery />
      <Contact />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
